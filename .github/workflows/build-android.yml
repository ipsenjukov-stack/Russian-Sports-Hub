name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/sports-russia/**'
      - 'lib/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:
    inputs:
      api_domain:
        description: 'Production API domain (without https://). Leave empty to use the default in the workflow.'
        required: false
        default: ''

env:
  NODE_VERSION: '24'
  JAVA_VERSION: '17'
  DEFAULT_API_DOMAIN: 'russian-sports-hub.replit.app'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve API domain
        id: api
        run: |
          DOMAIN="${{ github.event.inputs.api_domain }}"
          if [ -z "$DOMAIN" ]; then DOMAIN="$DEFAULT_API_DOMAIN"; fi
          echo "domain=$DOMAIN" >> "$GITHUB_OUTPUT"
          echo "Using API domain: $DOMAIN"

      - name: Expo prebuild (Android)
        working-directory: artifacts/sports-russia
        env:
          EXPO_PUBLIC_DOMAIN: ${{ steps.api.outputs.domain }}
        run: |
          npx expo prebuild --platform android --no-install --clean

      - name: Build release APK (debug-signed)
        working-directory: artifacts/sports-russia/android
        env:
          EXPO_PUBLIC_DOMAIN: ${{ steps.api.outputs.domain }}
          GRADLE_OPTS: -Xmx4g -Dorg.gradle.jvmargs=-Xmx4g
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=arm64-v8a,armeabi-v7a

      - name: Locate APK
        id: apk
        working-directory: artifacts/sports-russia
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -n1)
          echo "Found APK: $APK_PATH"
          echo "path=artifacts/sports-russia/$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sports-russia-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 30
